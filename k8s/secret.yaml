# Create with:
#   kubectl create secret generic lox-config \
#     --from-file=config.yaml=/path/to/your/config.yaml
#
# config.yaml should contain:
#   host: https://your-miniserver.local
#   user: admin
#   pass: your-password
#   serial: your-serial
apiVersion: v1
kind: Secret
metadata:
  name: lox-config
type: Opaque
stringData:
  config.yaml: |
    host: https://your-miniserver
    user: admin
    pass: changeme
    serial: ""
