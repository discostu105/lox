apiVersion: apps/v1
kind: Deployment
metadata:
  name: lox-otel
  labels:
    app: lox-otel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lox-otel
  template:
    metadata:
      labels:
        app: lox-otel
    spec:
      containers:
        - name: lox
          image: ghcr.io/discostu105/lox:latest
          args:
            - otel
            - serve
            - --interval
            - "60s"
            - --endpoint
            - "$(OTEL_EXPORTER_OTLP_ENDPOINT)"
            - --header
            - "$(OTEL_EXPORTER_OTLP_HEADERS)"
            - --delta
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://your-otlp-endpoint/api/v2/otlp"
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: lox-otel
                  key: headers
          volumeMounts:
            - name: config
              mountPath: /root/.lox
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          secret:
            secretName: lox-config
            items:
              - key: config.yaml
                path: config.yaml
